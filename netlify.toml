[build]
  # Build command - runs from the frontend directory
  command = "cd frontend && npm install && npm run build"
  
  # Publish directory - where the built files are located
  publish = "frontend/dist"
  
  # Base directory (optional, but helps Netlify understand the structure)
  base = "/"

# Redirect all routes to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables
[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"
