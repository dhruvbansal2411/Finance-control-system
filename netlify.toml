[build]
  # Base directory - tells Netlify where the frontend code is
  base = "frontend"
  
  # Build command - runs from the base directory
  command = "npm ci && npm run build"
  
  # Publish directory - relative to base directory
  publish = "dist"

# Redirect all routes to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables
[build.environment]
  NODE_VERSION = "18.18.0"
  NPM_VERSION = "9.8.1"

# Build settings
[build.processing]
  skip_processing = false
